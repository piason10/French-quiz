<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>프랑스어 퀴즈 - UI 최적화 완료</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f8f9fa; --sidebar-bg: #ffffff; }
        
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 사이드바 설정 */
        .sidebar { position: fixed; left: -100%; top: 0; width: 300px; height: 100%; background: var(--sidebar-bg); z-index: 1000; transition: 0.3s; box-shadow: 5px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; background: #34495e; color: white; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .close-sidebar { cursor: pointer; font-size: 1.5rem; }
        #wrong-list-container { flex: 1; overflow-y: auto; padding: 15px; }
        .wrong-item { background: #fff5f5; border: 1px solid #feb2b2; border-radius: 8px; padding: 12px; margin-bottom: 10px; font-size: 0.9rem; color: #c53030; }

        /* 메인 콘텐츠 */
        .main-content { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 40px 15px; overflow-y: auto; width: 100%; box-sizing: border-box; }
        .quiz-container { background: white; width: 100%; max-width: 480px; padding: 30px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.07); text-align: center; box-sizing: border-box; }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 25px; font-size: 0.85rem; color: #94a3b8; font-weight: 600; letter-spacing: 0.5px; }
        .question-card { background: #f8fafc; padding: 40px 20px; border-radius: 20px; margin-bottom: 25px; font-size: 1.5rem; font-weight: 800; color: #1e293b; min-height: 80px; display: flex; align-items: center; justify-content: center; border: 1px solid #f1f5f9; }
        
        input { width: 100%; padding: 16px; font-size: 18px; border: 2px solid #e2e8f0; border-radius: 14px; outline: none; text-align: center; box-sizing: border-box; transition: 0.2s; }
        input:focus { border-color: var(--primary); background: #fcfdff; box-shadow: 0 0 0 4px rgba(74, 144, 226, 0.1); }
        
        /* 버튼 그룹: 모든 버튼을 세로로 길게 정렬하여 균형 유지 */
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        button { width: 100%; padding: 15px; font-size: 1rem; cursor: pointer; border: none; border-radius: 14px; background: var(--primary); color: white; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        
        #check-btn { background: #1e293b; font-size: 1.1rem; padding: 18px; margin-bottom: 5px; }
        #shuffle-btn { background: #6c5ce7; }
        #view-wrong-btn { background: #ff7675; }
        #review-btn { background: #f39c12; display: none; }
        #reset-btn { background: #94a3b8; margin-top: 10px; }
        
        #msg { margin-top: 20px; font-weight: bold; min-height: 24px; font-size: 1rem; }

        /* 데스크탑 레이아웃 (768px 이상) */
        @media (min-width: 768px) {
            body { flex-direction: row; }
            .sidebar { position: relative; left: 0; width: 320px; box-shadow: none; border-right: 1px solid #e2e8f0; }
            .sidebar-header { justify-content: center; }
            .close-sidebar { display: none; }
            #view-wrong-btn { display: none; } /* PC에서는 사이드바가 상시 노출되므로 버튼 숨김 */
        }

        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>❌ 오답 리스트</span>
            <span class="close-sidebar" onclick="toggleSidebar()">✕</span>
        </div>
        <div id="wrong-list-container"></div>
    </div>

    <div class="main-content">
        <div class="quiz-container">
            <div id="mode-badge" style="font-size: 0.75rem; color: #94a3b8; margin-bottom: 10px; font-weight: 700;">NORMAL MODE</div>
            <div class="stats">
                <div>PROGRESS: <span id="curr-idx">1</span> / 84</div>
                <div>WRONG: <span id="wrong-count">0</span></div>
            </div>
            <div class="question-card" id="q-text">준비 중...</div>
            <input type="text" id="user-input" placeholder="정답을 입력하세요" autocomplete="off" autocapitalize="off" spellcheck="false">
            
            <div class="btn-group">
                <button id="check-btn" onclick="check()">확인 (ENTER)</button>
                <button id="shuffle-btn" onclick="shuffleAndStart()">순서 섞기</button>
                <button id="view-wrong-btn" onclick="toggleSidebar()">오답 확인하기</button>
                <button id="review-btn" onclick="startReview()">오답만 복습하기</button>
                <button id="reset-btn" onclick="resetAll()">전체 데이터 초기화</button>
            </div>
            <div id="msg"></div>
        </div>
    </div>

    <script>
        // [rawData 데이터는 이전과 동일]
        const rawData = [
            {v:"être", p:"Je", a:"suis"}, {v:"être", p:"Tu", a:"es"}, {v:"être", p:"Il", a:"est"}, {v:"être", p:"Nous", a:"sommes"}, {v:"être", p:"Vous", a:"êtes"}, {v:"être", p:"Ils", a:"sont"},
            {v:"aller", p:"Je", a:"vais"}, {v:"aller", p:"Tu", a:"vas"}, {v:"aller", p:"Elle", a:"va"}, {v:"aller", p:"Nous", a:"allons"}, {v:"aller", p:"Vous", a:"allez"}, {v:"aller", p:"Elles", a:"vont"},
            {v:"prendre", p:"Je", a:"prends"}, {v:"prendre", p:"Tu", a:"prends"}, {v:"prendre", p:"Il", a:"prend"}, {v:"prendre", p:"Nous", a:"prenons"}, {v:"prendre", p:"Vous", a:"prenez"}, {v:"prendre", p:"Ils", a:"prennent"},
            {v:"faire", p:"Je", a:"fais"}, {v:"faire", p:"Tu", a:"fais"}, {v:"faire", p:"Elle", a:"fait"}, {v:"faire", p:"Nous", a:"faisons"}, {v:"faire", p:"Vous", a:"faites"}, {v:"faire", p:"Elles", a:"font"},
            {v:"vouloir", p:"Je", a:"veux"}, {v:"vouloir", p:"Tu", a:"veux"}, {v:"vouloir", p:"Il", a:"veut"}, {v:"vouloir", p:"Nous", a:"voulons"}, {v:"vouloir", p:"Vous", a:"voulez"}, {v:"vouloir", p:"Ils", a:"veulent"},
            {v:"pouvoir", p:"Je", a:"peux"}, {v:"pouvoir", p:"Tu", a:"peux"}, {v:"pouvoir", p:"Elle", a:"peut"}, {v:"pouvoir", p:"Nous", a:"pouvons"}, {v:"pouvoir", p:"Vous", a:"pouvez"}, {v:"pouvoir", p:"Elles", a:"peuvent"},
            {v:"savoir", p:"Je", a:"sais"}, {v:"savoir", p:"Tu", a:"sais"}, {v:"savoir", p:"Il", a:"sait"}, {v:"savoir", p:"Nous", a:"savons"}, {v:"savoir", p:"Vous", a:"savez"}, {v:"savoir", p:"Ils", a:"savent"},
            {v:"aimer", p:"J'", a:"aime"}, {v:"aimer", p:"Tu", a:"aimes"}, {v:"aimer", p:"Elle", a:"aime"}, {v:"aimer", p:"Nous", a:"aimons"}, {v:"aimer", p:"Vous", a:"aimez"}, {v:"aimer", p:"Ils", a:"aiment"},
            {v:"habiter", p:"J'", a:"habite"}, {v:"habiter", p:"Tu", a:"habites"}, {v:"habiter", p:"Il", a:"habite"}, {v:"habiter", p:"Nous", a:"habitons"}, {v:"habiter", p:"Vous", a:"habitez"}, {v:"habiter", p:"Elles", a:"habitent"},
            {v:"travailler", p:"Je", a:"travaille"}, {v:"travailler", p:"Tu", a:"travailles"}, {v:"travailler", p:"Elle", a:"travaille"}, {v:"travailler", p:"Nous", a:"travaillons"}, {v:"travailler", p:"Vous", a:"travaillez"}, {v:"travailler", p:"Ils", a:"travaillent"},
            {v:"rencontrer", p:"Je", a:"rencontre"}, {v:"rencontrer", p:"Tu", a:"rencontres"}, {v:"rencontrer", p:"Il", a:"rencontre"}, {v:"rencontrer", p:"Nous", a:"rencontrons"}, {v:"rencontrer", p:"Vous", a:"rencontrez"}, {v:"rencontrer", p:"Elles", a:"rencontrent"},
            {v:"arriver", p:"J'", a:"arrive"}, {v:"arriver", p:"Tu", a:"arrives"}, {v:"arriver", p:"Elle", a:"arrive"}, {v:"arriver", p:"Nous", a:"arrivons"}, {v:"arriver", p:"Vous", a:"arrivez"}, {v:"arriver", p:"Ils", a:"arrivent"},
            {v:"parler", p:"Je", a:"parle"}, {v:"parler", p:"Tu", a:"parles"}, {v:"parler", p:"Il", a:"parle"}, {v:"parler", p:"Nous", a:"parlons"}, {v:"parler", p:"Vous", a:"parlez"}, {v:"parler", p:"Elles", a:"parlent"},
            {v:"appeler", p:"J'", a:"appelle"}, {v:"appeler", p:"Tu", a:"appelles"}, {v:"appeler", p:"Elle", a:"appelle"}, {v:"appeler", p:"Nous", a:"appelons"}, {v:"appeler", p:"Vous", a:"appelez"}, {v:"appeler", p:"Ils", a:"appellent"}
        ];

        let currentList = [...rawData];
        let wrongIndices = [];
        let idx = 0;

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function updateDisplay() {
            const qCard = document.getElementById('q-text');
            if (idx < currentList.length) {
                const item = currentList[idx];
                qCard.innerText = `${item.p} (${item.v}) _______`;
                document.getElementById('curr-idx').innerText = idx + 1;
                document.getElementById('user-input').value = "";
                document.getElementById('user-input').focus();
            } else {
                qCard.innerText = "모든 학습 완료! 🎉";
                if (wrongIndices.length > 0) document.getElementById('review-btn').style.display = "block";
            }
            updateWrongSidebar();
            save();
        }

        function updateWrongSidebar() {
            const container = document.getElementById('wrong-list-container');
            container.innerHTML = "";
            wrongIndices.forEach(i => {
                const item = rawData[i];
                const div = document.createElement('div');
                div.className = "wrong-item";
                div.innerHTML = `<b>${item.v}</b>: ${item.p} <br>정답: <b>${item.a}</b>`;
                container.appendChild(div);
            });
            document.getElementById('wrong-count').innerText = wrongIndices.length;
        }

        function check() {
            const input = document.getElementById('user-input').value.trim().toLowerCase();
            const answer = currentList[idx].a.toLowerCase();
            const msg = document.getElementById('msg');

            if (input === answer) {
                msg.innerText = "정답입니다! ✨";
                msg.style.color = "var(--success)";
                idx++;
                setTimeout(() => { msg.innerText = ""; updateDisplay(); }, 400);
            } else {
                msg.innerText = `오답! 정답: [ ${answer} ]`;
                msg.style.color = "var(--error)";
                const originalIdx = rawData.indexOf(currentList[idx]);
                if (!wrongIndices.includes(originalIdx)) {
                    wrongIndices.push(originalIdx);
                    updateWrongSidebar();
                }
            }
        }

        function shuffleAndStart() {
            if(confirm("문제를 랜덤하게 섞고 처음부터 다시 시작할까요?")) {
                currentList.sort(() => Math.random() - 0.5);
                idx = 0; wrongIndices = [];
                document.getElementById('mode-badge').innerText = "RANDOM MODE 🎲";
                document.getElementById('review-btn').style.display = "none";
                updateDisplay();
            }
        }

        function startReview() {
            currentList = wrongIndices.map(i => rawData[i]);
            wrongIndices = []; idx = 0;
            document.getElementById('mode-badge').innerText = "REVIEW MODE 📝";
            document.getElementById('review-btn').style.display = "none";
            updateDisplay();
        }

        function resetAll() {
            if(confirm("모든 데이터를 초기화할까요?")) {
                localStorage.clear();
                location.reload();
            }
        }

        function save() {
            localStorage.setItem('vFinal_idx', idx);
            localStorage.setItem('vFinal_list', JSON.stringify(currentList));
            localStorage.setItem('vFinal_wrong', JSON.stringify(wrongIndices));
            localStorage.setItem('vFinal_mode', document.getElementById('mode-badge').innerText);
        }

        function load() {
            const sIdx = localStorage.getItem('vFinal_idx');
            const sList = localStorage.getItem('vFinal_list');
            const sWrong = localStorage.getItem('vFinal_wrong');
            const sMode = localStorage.getItem('vFinal_mode');
            if (sList) currentList = JSON.parse(sList);
            if (sIdx) idx = parseInt(sIdx);
            if (sWrong) wrongIndices = JSON.parse(sWrong);
            if (sMode) document.getElementById('mode-badge').innerText = sMode;
            updateDisplay();
        }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key==='Enter') check(); });
        window.onload = load;
    </script>
</body>
</html>

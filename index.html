<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>프랑스어 종합 문법 퀴즈</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f8f9fa; --sidebar-bg: #ffffff; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 사이드바 */
        .sidebar { position: fixed; left: -100%; top: 0; width: 300px; height: 100%; background: var(--sidebar-bg); z-index: 1000; transition: 0.3s; box-shadow: 5px 0 15px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .sidebar.active { left: 0; }
        .sidebar-header { padding: 20px; background: #34495e; color: white; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .close-sidebar { cursor: pointer; font-size: 1.5rem; }
        #wrong-list-container { flex: 1; overflow-y: auto; padding: 15px; }
        .wrong-item { background: #fff5f5; border: 1px solid #feb2b2; border-radius: 8px; padding: 12px; margin-bottom: 10px; font-size: 0.9rem; color: #c53030; }

        /* 메인 콘텐츠 */
        .main-content { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 20px 15px; overflow-y: auto; width: 100%; box-sizing: border-box; }
        .quiz-container { background: white; width: 100%; max-width: 500px; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.07); text-align: center; box-sizing: border-box; }
        
        /* 카테고리 탭 (스크롤 가능) */
        .category-tabs { display: flex; gap: 8px; margin-bottom: 20px; background: #eee; padding: 8px; border-radius: 12px; overflow-x: auto; white-space: nowrap; -webkit-overflow-scrolling: touch; }
        .category-tabs::-webkit-scrollbar { display: none; }
        .category-tabs button { flex: 0 0 auto; padding: 10px 15px; font-size: 0.8rem; border-radius: 8px; background: none; color: #666; cursor: pointer; border: none; }
        .category-tabs button.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold; }

        .stats { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 0.85rem; color: #94a3b8; font-weight: 600; }
        .question-card { background: #f8fafc; padding: 35px 15px; border-radius: 20px; margin-bottom: 20px; min-height: 100px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #f1f5f9; }
        .q-main { font-size: 1.6rem; font-weight: 800; color: #1e293b; margin-bottom: 8px; }
        .q-hint { font-size: 0.9rem; color: #64748b; font-weight: 500; }
        
        input { width: 100%; padding: 16px; font-size: 18px; border: 2px solid #e2e8f0; border-radius: 14px; outline: none; text-align: center; box-sizing: border-box; }
        input:focus { border-color: var(--primary); background: #fcfdff; }
        
        .btn-group { display: flex; flex-direction: column; gap: 8px; margin-top: 20px; }
        button { width: 100%; padding: 14px; font-size: 0.95rem; cursor: pointer; border: none; border-radius: 14px; background: var(--primary); color: white; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        
        #check-btn { background: #1e293b; font-size: 1.1rem; padding: 16px; }
        #review-btn { background: #f39c12; display: none; }
        #reset-btn { background: #94a3b8; }
        
        #msg { margin-top: 15px; font-weight: bold; min-height: 24px; font-size: 1rem; }

        @media (min-width: 1024px) {
            body { flex-direction: row; }
            .sidebar { position: relative; left: 0; width: 350px; box-shadow: none; border-right: 1px solid #e2e8f0; }
            .sidebar-header { justify-content: center; }
            .close-sidebar { display: none; }
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
        .overlay.active { display: block; }
    </style>
</head>
<body>
    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header"><span>❌ 오답 리스트</span><span class="close-sidebar" onclick="toggleSidebar()">✕</span></div>
        <div id="wrong-list-container"></div>
    </div>

    <div class="main-content">
        <div class="quiz-container">
            <div class="category-tabs">
                <button id="tab-all" class="active" onclick="changeCategory('all')">전체</button>
                <button id="tab-v" onclick="changeCategory('v')">동사</button>
                <button id="tab-dp" onclick="changeCategory('dp')">강세형</button>
                <button id="tab-pa" onclick="changeCategory('pa')">소유한정사</button>
                <button id="tab-da" onclick="changeCategory('da')">지시한정사</button>
                <button id="tab-pt" onclick="changeCategory('pt')">부분관사</button>
            </div>

            <div id="mode-badge" style="font-size: 0.7rem; color: #94a3b8; margin-bottom: 8px; font-weight: 700;">NORMAL MODE</div>
            <div class="stats">
                <div>PROGRESS: <span id="curr-idx">1</span> / <span id="total-idx">0</span></div>
                <div>WRONG: <span id="wrong-count">0</span></div>
            </div>
            <div class="question-card">
                <div class="q-main" id="q-main">준비 중...</div>
                <div class="q-hint" id="q-hint"></div>
            </div>
            <input type="text" id="user-input" placeholder="정답 입력" autocomplete="off" autocapitalize="off" spellcheck="false">
            
            <div class="btn-group">
                <button id="check-btn" onclick="check()">확인 (ENTER)</button>
                <button id="review-btn" onclick="startReview()">오답 복습하기</button>
                <button id="reset-btn" onclick="resetAll()">초기화</button>
            </div>
            <div id="msg"></div>
        </div>
    </div>

    <script>
        const rawData = [
            // 강세형 대명사 (dp)
            {q:"je", h:"강세형 대명사", a:"moi", t:"dp"}, {q:"tu", h:"강세형 대명사", a:"toi", t:"dp"}, {q:"il", h:"강세형 대명사", a:"lui", t:"dp"}, {q:"elle", h:"강세형 대명사", a:"elle", t:"dp"},
            {q:"nous", h:"강세형 대명사", a:"nous", t:"dp"}, {q:"vous", h:"강세형 대명사", a:"vous", t:"dp"}, {q:"ils", h:"강세형 대명사", a:"eux", t:"dp"}, {q:"elles", h:"강세형 대명사", a:"elles", t:"dp"},
            
            // 소유한정사 (pa) - 모음 규칙 포함
            {q:"livre (m)", h:"나의 (소유)", a:"mon", t:"pa"}, {q:"table (f)", h:"나의 (소유)", a:"ma", t:"pa"}, {q:"amie (f/모음)", h:"나의 (소유)", a:"mon", t:"pa"},
            {q:"école (f/모음)", h:"너의 (소유)", a:"ton", t:"pa"}, {q:"ordinateur (m)", h:"그의 (소유)", a:"son", t:"pa"}, {q:"idées (pl)", h:"그녀의 (소유)", a:"ses", t:"pa"},
            {q:"maison", h:"우리들의 (소유)", a:"notre", t:"pa"}, {q:"parents", h:"우리들의 (소유)", a:"nos", t:"pa"}, {q:"voiture", h:"당신들의 (소유)", a:"votre", t:"pa"},
            
            // 지시한정사 (da)
            {q:"garçon (m)", h:"이/그 (지시)", a:"ce", t:"da"}, {q:"homme (h무음)", h:"이/그 (지시)", a:"cet", t:"da"}, {q:"amie (f)", h:"이/그 (지시)", a:"cette", t:"da"}, {q:"enfants (pl)", h:"이/저 (지시)", a:"ces", t:"da"},
            
            // 부분관사 (pt)
            {q:"pain (m)", h:"약간의 (부분관사)", a:"du", t:"pt"}, {q:"viande (f)", h:"약간의 (부분관사)", a:"de la", t:"pt"}, {q:"eau (모음)", h:"약간의 (부분관사)", a:"de l'", t:"pt"}, {q:"pâtes (pl)", h:"약간의 (부분관사)", a:"des", t:"pt"},
            
            // 기존 동사 일부 (v)
            {q:"Je (être)", h:"동사 변화", a:"suis", t:"v"}, {q:"Tu (avoir)", h:"동사 변화", a:"as", t:"v"}, {q:"Nous (aller)", h:"동사 변화", a:"allons", t:"v"}
        ];

        let currentList = [...rawData];
        let wrongIndices = [];
        let idx = 0;
        let currentCategory = 'all';

        function changeCategory(cat) {
            currentCategory = cat;
            idx = 0;
            wrongIndices = [];
            document.querySelectorAll('.category-tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${cat}`).classList.add('active');

            if (cat === 'all') currentList = [...rawData];
            else currentList = rawData.filter(d => d.t === cat);

            document.getElementById('mode-badge').innerText = `${cat.toUpperCase()} MODE`;
            updateDisplay();
        }

        function updateDisplay() {
            const qMain = document.getElementById('q-main');
            const qHint = document.getElementById('q-hint');
            const inputField = document.getElementById('user-input');

            if (idx < currentList.length) {
                const item = currentList[idx];
                qMain.innerText = item.q;
                qHint.innerText = item.h;
                document.getElementById('curr-idx').innerText = idx + 1;
                document.getElementById('total-idx').innerText = currentList.length;
                inputField.value = "";
                inputField.focus();
            } else {
                qMain.innerText = "카테고리 학습 완료! 🎉";
                qHint.innerText = "";
                if (wrongIndices.length > 0) document.getElementById('review-btn').style.display = "block";
            }
            updateWrongSidebar();
        }

        function check() {
            const inputField = document.getElementById('user-input');
            const input = inputField.value.trim().toLowerCase();
            const answer = currentList[idx].a.toLowerCase();
            const msg = document.getElementById('msg');

            if (input === answer) {
                msg.innerText = "정답입니다! ✨";
                msg.style.color = "var(--success)";
                idx++;
                setTimeout(() => { msg.innerText = ""; updateDisplay(); }, 400);
            } else {
                msg.innerText = `오답! 정답: [ ${answer} ]`;
                msg.style.color = "var(--error)";
                const currentItem = currentList[idx];
                const originalIdx = rawData.findIndex(item => item.q === currentItem.q && item.a === currentItem.a);
                if (!wrongIndices.includes(originalIdx)) wrongIndices.push(originalIdx);
                updateWrongSidebar();
            }
        }

        function updateWrongSidebar() {
            const container = document.getElementById('wrong-list-container');
            container.innerHTML = "";
            wrongIndices.forEach(oIdx => {
                const item = rawData[oIdx];
                const div = document.createElement('div');
                div.className = "wrong-item";
                div.innerHTML = `[${item.h}] <b>${item.q}</b> <br>정답: <b>${item.a}</b>`;
                container.appendChild(div);
            });
            document.getElementById('wrong-count').innerText = wrongIndices.length;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
            document.getElementById('overlay').classList.toggle('active');
        }

        function startReview() {
            currentList = wrongIndices.map(i => rawData[i]);
            wrongIndices = []; idx = 0;
            document.getElementById('mode-badge').innerText = "REVIEW MODE 📝";
            document.getElementById('review-btn').style.display = "none";
            updateDisplay();
        }

        function resetAll() { location.reload(); }

        document.getElementById('user-input').addEventListener('keypress', (e) => { if(e.key==='Enter') check(); });
        window.onload = () => changeCategory('all');
    </script>
</body>
</html>
